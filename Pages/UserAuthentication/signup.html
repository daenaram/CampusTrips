<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/loginformStyles.css">
    <title>AUT Web-Based Travel Planner</title>
</head>
<body>

    <div class="logo_container">
        <a href="https://www.freelogovectors.net/auckland-university-of-technology-logo-aut/"><img
                src="https://www.freelogovectors.net/wp-content/uploads/2023/11/auckland-university-of-technology-logo-freelogovectors.net_.png"
                alt="Auckland University of Technology Logo (AUT)" class="logo"></a>
    </div>

    <h1>AUT Web-Based Travel Planner</h1>
    <h2>Create a New Account</h2>

    <form method="POST" action="../../assets/api/auth/signup.php">
        <br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br>
        <label for="email">Email: <span class="note">*</span></label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="password">Password: <span class="note">*</span></label>
        <input type="password" id="password" name="password" required>
        <br>
        <label for="confirmPassword">Confirm Password: <span class="note">*</span></label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
        <br>
        <button type="submit">Sign Up</button>
        <button type="backButton" onclick="location.href='loginForm.html'">Already have an account? Login</button>
    </form>

    <!-- Error Modal -->
    <div id="error-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Email Already Registered</h3>
            <p>
                This email is already associated with an account.
                Please use a different email or
                <a href="loginForm.html">log in instead</a>.
            </p>
            <button class="modal-close-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="../../assets/js/signup.js"></script>
</body>
</html>
